# Las variables de entorno se configuran en el dashboard de Render

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=true

app.upload.dir=/tmp/uploads/

factiliza.token=${FACTILIZA_TOKEN}

spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

flow.api.key=${FLOW_API_KEY}
flow.secret.key=${FLOW_SECRET_KEY}
flow.api.url=${FLOW_API_URL:https://www.flow.cl/api}

brevo.api-key=${BREVO_API_KEY}
brevo.from-email=${BREVO_FROM_EMAIL}
