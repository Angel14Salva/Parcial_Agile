<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Todas las multas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
  </div>
</nav>
<div class="container">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">Registro de multas</h4>
  </div>

  <div th:if="${#lists.isEmpty(multas)}" class="text-center py-5">
    <i class="bi bi-shield-check text-success" style="font-size:3rem"></i>
    <p class="text-muted mt-3">No hay multas registradas.</p>
  </div>

  <div class="table-responsive" th:unless="${#lists.isEmpty(multas)}">
    <table class="table table-hover bg-white shadow-sm rounded">
      <thead style="background:#1D3557;color:#fff">
        <tr>
          <th>Negocio</th>
          <th>Licencia</th>
          <th>Descripción</th>
          <th>Monto</th>
          <th>Estado</th>
          <th>Inspector</th>
          <th>Fecha</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="m : ${multas}">
          <td class="fw-semibold small"
              th:text="${m.licencia.solicitud.razonSocial}"></td>
          <td class="small" th:text="${m.licencia.numeroLicencia}"></td>
          <td class="small" th:text="${#strings.abbreviate(m.descripcion, 40)}"></td>
          <td class="fw-bold text-danger"
              th:text="'S/ ' + ${m.monto}"></td>
          <td>
            <span class="badge"
                  th:classappend="${m.estado.name() == 'PENDIENTE'} ? 'bg-danger' :
                                  (${m.estado.name() == 'PAGADA'} ? 'bg-success' : 'bg-warning text-dark')"
                  th:text="${m.estado.name()}"></span>
          </td>
          <td class="small" th:text="${m.inspector.nombreCompleto}"></td>
          <td class="small text-muted"
              th:text="${#temporals.format(m.creadoEn,'dd/MM/yy HH:mm')}"></td>
          <td>
            <a th:href="@{/multas/licencia/{id}(id=${m.licencia.id})}"
               class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-eye"></i>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
