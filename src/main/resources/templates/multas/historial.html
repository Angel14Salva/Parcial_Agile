<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Historial de multas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
  </div>
</nav>
<div class="container" style="max-width:760px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div>
      <h4 class="fw-bold mb-0">Historial de multas</h4>
      <p class="text-muted small mb-0"
         th:text="${licencia.solicitud.razonSocial} + ' · ' + ${licencia.numeroLicencia}"></p>
    </div>
  </div>

  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Botón nueva multa solo para inspector/admin -->
  <div class="d-flex justify-content-end mb-3">
    <a th:href="@{/multas/licencia/{id}/nueva(id=${licencia.id})}"
       class="btn btn-danger btn-sm">
      <i class="bi bi-plus-circle me-1"></i>Registrar nueva multa
    </a>
  </div>

  <div th:if="${#lists.isEmpty(multas)}" class="text-center py-5">
    <i class="bi bi-shield-check text-success" style="font-size:3rem"></i>
    <p class="text-muted mt-3">No hay multas registradas para esta licencia.</p>
  </div>

  <div th:each="m : ${multas}" class="card shadow-sm mb-3 border-danger">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <span class="badge"
              th:classappend="${m.estado.name() == 'PENDIENTE'} ? 'bg-danger' :
                              (${m.estado.name() == 'PAGADA'} ? 'bg-success' : 'bg-warning text-dark')"
              th:text="${m.estado.name()}">ESTADO</span>
        <small class="text-muted"
               th:text="${#temporals.format(m.creadoEn,'dd/MM/yyyy HH:mm')}"></small>
      </div>
      <p class="mb-2" th:text="${m.descripcion}"></p>
      <div class="d-flex justify-content-between align-items-center">
        <span class="fw-bold text-danger fs-5"
              th:text="'S/ ' + ${m.monto}"></span>
        <small class="text-muted"
               th:text="'Inspector: ' + ${m.inspector.nombreCompleto}"></small>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
