<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Detalle de multa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
  </div>
</nav>
<div class="container" style="max-width:600px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">Detalle de multa</h4>
  </div>

  <div th:if="${exito}" class="alert alert-success">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
  </div>
  <div th:if="${error}" class="alert alert-danger">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
  </div>

  <div class="card shadow-sm border-danger mb-4">
    <div class="card-header bg-danger text-white fw-semibold">
      <i class="bi bi-exclamation-octagon me-2"></i>Expediente de multa
    </div>
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-5 text-muted">Negocio</dt>
        <dd class="col-sm-7 fw-bold"
            th:text="${multa.licencia.solicitud.razonSocial}"></dd>

        <dt class="col-sm-5 text-muted">Licencia</dt>
        <dd class="col-sm-7"
            th:text="${multa.licencia.numeroLicencia}"></dd>

        <dt class="col-sm-5 text-muted">Inspector</dt>
        <dd class="col-sm-7"
            th:text="${multa.inspector.nombreCompleto}"></dd>

        <dt class="col-sm-5 text-muted">Fecha</dt>
        <dd class="col-sm-7"
            th:text="${#temporals.format(multa.creadoEn,'dd/MM/yyyy HH:mm')}"></dd>

        <dt class="col-sm-5 text-muted">Descripción</dt>
        <dd class="col-sm-7" th:text="${multa.descripcion}"></dd>

        <dt class="col-sm-5 text-muted">Monto</dt>
        <dd class="col-sm-7 fw-bold fs-5 text-danger"
            th:text="'S/ ' + ${multa.monto}"></dd>

        <dt class="col-sm-5 text-muted">Estado</dt>
        <dd class="col-sm-7">
          <span class="badge"
                th:classappend="${multa.estado.name() == 'PENDIENTE'} ? 'bg-danger' :
                                 (${multa.estado.name() == 'PAGADA'} ? 'bg-success' : 'bg-warning text-dark')"
                th:text="${multa.estado.name()}"></span>
        </dd>
      </dl>
    </div>
  </div>

  <!-- Botón pagar: solo para rol NEGOCIO -->
  <div th:if="${multa.estado.name() == 'PENDIENTE'}" sec:authorize="hasRole('NEGOCIO')" class="card shadow-sm border-success">
    <div class="card-body text-center p-4">
      <p class="text-muted small mb-3">
        Paga tu multa de forma segura a través de <strong>Flow</strong>.
      </p>
      <form th:action="@{/multas/{id}/pagar(id=${multa.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">
          <i class="bi bi-credit-card me-2"></i>
          Pagar multa S/ <span th:text="${multa.monto}"></span> con Flow
        </button>
      </form>
    </div>
  </div>

  <div th:if="${multa.estado.name() == 'PAGADA'}" class="alert alert-success text-center">
    <i class="bi bi-check-circle-fill fs-4 me-2"></i>
    <strong>Multa pagada.</strong> Esta multa ya fue cancelada.
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
