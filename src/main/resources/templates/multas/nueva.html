<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Registrar multa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
  </div>
</nav>
<div class="container" style="max-width:600px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a th:href="@{/multas/licencia/{id}(id=${licencia.id})}"
       class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div>
      <h4 class="fw-bold mb-0">Registrar multa</h4>
      <p class="text-muted small mb-0" th:text="${licencia.solicitud.razonSocial}"></p>
    </div>
  </div>

  <div class="card shadow-sm border-danger">
    <div class="card-header bg-danger text-white fw-semibold">
      <i class="bi bi-exclamation-octagon me-2"></i>Nueva multa
    </div>
    <div class="card-body p-4">
      <form th:action="@{/multas/licencia/{id}/nueva(id=${licencia.id})}" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Descripción de la infracción <span class="text-danger">*</span>
          </label>
          <textarea name="descripcion" class="form-control" rows="3" required
                    placeholder="Ej: Ampliación del local sin autorización municipal..."></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">
            Monto de la multa (S/) <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <span class="input-group-text">S/</span>
            <input type="number" name="monto" class="form-control"
                   min="1" step="0.01" required placeholder="0.00"/>
          </div>
        </div>
        <div class="alert alert-warning py-2 small mb-4">
          <i class="bi bi-info-circle me-1"></i>
          La multa quedará registrada en el historial del negocio y se enviará
          una notificación al titular de la licencia.
        </div>
        <div class="d-flex gap-2">
          <a th:href="@{/multas/licencia/{id}(id=${licencia.id})}"
             class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-danger fw-semibold">
            <i class="bi bi-save me-2"></i>Registrar multa
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
