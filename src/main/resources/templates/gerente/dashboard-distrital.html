<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Panel Gerente Distrital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white small" th:text="${usuario.nombreCompleto}"></span>
      <a href="/auth/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
    </div>
  </div>
</nav>
<div class="container">
  <div class="mb-4">
    <h4 class="fw-bold mb-0">Panel del Gerente Distrital</h4>
    <p class="text-muted small">Distrito: <strong th:text="${usuario.distrito?.name()?.replace('_',' ')}"></strong></p>
  </div>

  <!-- Estadísticas -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <div class="fs-2 fw-bold text-primary" th:text="${totalSolicitudes}">0</div>
          <div class="small text-muted">Total solicitudes</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <div class="fs-2 fw-bold text-success" th:text="${aprobadas}">0</div>
          <div class="small text-muted">Aprobadas</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <div class="fs-2 fw-bold text-warning" th:text="${pendientes}">0</div>
          <div class="small text-muted">En proceso</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <div class="fs-2 fw-bold text-info" th:text="${totalFiscalizadores}">0</div>
          <div class="small text-muted">Fiscalizadores</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Subgerente -->
  <h5 class="fw-semibold mb-3"><i class="bi bi-person-badge me-2"></i>Subgerente del distrito</h5>
  <div class="card shadow-sm mb-4">
    <div class="card-body" th:if="${subgerente != null}">
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-person-circle fs-2 text-primary"></i>
        <div>
          <div class="fw-bold" th:text="${subgerente.nombreCompleto}"></div>
          <div class="text-muted small" th:text="${subgerente.email}"></div>
          <div class="text-muted small" th:text="${subgerente.telefono ?: '-'}"></div>
        </div>
      </div>
    </div>
    <div class="card-body text-muted" th:unless="${subgerente != null}">Sin subgerente asignado.</div>
  </div>

  <!-- Fiscalizadores -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-semibold mb-0"><i class="bi bi-people me-2"></i>Fiscalizadores</h5>
    <a href="/admin/inspectores/nuevo" class="btn btn-primary btn-sm">
      <i class="bi bi-person-plus me-1"></i>Nuevo fiscalizador
    </a>
  </div>
  <div class="table-responsive mb-4">
    <table class="table table-hover bg-white shadow-sm rounded">
      <thead style="background:#457B9D;color:#fff">
        <tr><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Colegiatura</th><th>Estado</th><th>Acciones</th></tr>
      </thead>
      <tbody>
        <tr th:each="f : ${fiscalizadores}">
          <td th:text="${f.nombreCompleto}"></td>
          <td th:text="${f.dni ?: '-'}"></td>
          <td th:text="${f.telefono ?: '-'}"></td>
          <td th:text="${f.numeroColegiatura ?: '-'}"></td>
          <td>
            <span th:if="${f.activo}" class="badge bg-success">Activo</span>
            <span th:unless="${f.activo}" class="badge bg-secondary">Inactivo</span>
          </td>
          <td>
            <a th:href="@{/admin/inspectores/{id}/editar(id=${f.id})}" class="btn btn-outline-primary btn-sm">
              <i class="bi bi-pencil"></i>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
