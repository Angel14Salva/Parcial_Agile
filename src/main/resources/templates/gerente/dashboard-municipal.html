<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Panel Gerente Municipal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8} .distrito-card:hover{transform:translateY(-2px);transition:.2s}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white small" th:text="${usuario.nombreCompleto}"></span>
      <a href="/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
    </div>
  </div>
</nav>
<div class="container">
  <div class="mb-4">
    <h4 class="fw-bold mb-0">Panel del Gerente Municipal</h4>
    <p class="text-muted small">Municipalidad Provincial de Trujillo — Visión global de todos los distritos</p>
  </div>

  <!-- Resumen global -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card text-center shadow-sm border-primary">
        <div class="card-body">
          <div class="fs-2 fw-bold text-primary" th:text="${totalSolicitudes}">0</div>
          <div class="small text-muted">Total solicitudes</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center shadow-sm border-success">
        <div class="card-body">
          <div class="fs-2 fw-bold text-success" th:text="${totalAprobadas}">0</div>
          <div class="small text-muted">Licencias emitidas</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center shadow-sm border-warning">
        <div class="card-body">
          <div class="fs-2 fw-bold text-warning" th:text="${totalPendientes}">0</div>
          <div class="small text-muted">En proceso</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center shadow-sm border-info">
        <div class="card-body">
          <div class="fs-2 fw-bold text-info" th:text="${totalFuncionarios}">0</div>
          <div class="small text-muted">Funcionarios activos</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel por distrito -->
  <h5 class="fw-semibold mb-3"><i class="bi bi-map me-2"></i>Gestión por distrito</h5>
  <div class="row g-3 mb-4">
    <div class="col-md-4" th:each="d : ${distritos}">
      <div class="card shadow-sm distrito-card">
        <div class="card-header fw-semibold" style="background:#457B9D;color:#fff">
          <i class="bi bi-geo-alt me-2"></i>
          <span th:text="${d.nombre}"></span>
        </div>
        <div class="card-body small">
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Gerente:</span>
            <span th:text="${d.gerente ?: 'Sin asignar'}" class="fw-semibold"></span>
          </div>
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Subgerente:</span>
            <span th:text="${d.subgerente ?: 'Sin asignar'}" class="fw-semibold"></span>
          </div>
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Fiscalizadores:</span>
            <span th:text="${d.numFiscalizadores}" class="badge bg-info text-dark"></span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-muted">Solicitudes:</span>
            <span th:text="${d.numSolicitudes}" class="badge bg-primary"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
