<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Renovación Confirmada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body{background:#f0f4f8}
    .comprobante{max-width:620px;margin:60px auto;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.10);overflow:hidden}
    .header-ok{background:#1D3557;color:#fff;padding:36px 32px 24px;text-align:center}
    .info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f4f8}
    .info-label{color:#6c757d;font-size:.92rem}
    .info-value{font-weight:600;font-size:.92rem}
  </style>
</head>
<body>
<div class="comprobante">
  <div class="header-ok">
    <i class="bi bi-check-circle-fill" style="font-size:3rem;color:#4CAF50"></i>
    <h3 class="mt-3 mb-1">¡Renovación confirmada!</h3>
    <p class="mb-0 opacity-75">Tu licencia ha sido renovada exitosamente</p>
  </div>
  <div class="p-4">
    <div class="alert alert-success text-center mb-4">
      <i class="bi bi-calendar-check me-2"></i>
      Nueva fecha de vencimiento: <strong th:text="${#temporals.format(nuevaFecha,'dd/MM/yyyy')}"></strong>
    </div>
    <h6 class="fw-bold mb-3 text-muted">DETALLE DE LA RENOVACIÓN</h6>
    <div class="info-row">
      <span class="info-label">N° Licencia</span>
      <span class="info-value" th:text="${licencia.numeroLicencia}"></span>
    </div>
    <div class="info-row">
      <span class="info-label">Razón Social</span>
      <span class="info-value" th:text="${licencia.solicitud.razonSocial}"></span>
    </div>
    <div class="info-row">
      <span class="info-label">Dirección</span>
      <span class="info-value" th:text="${licencia.solicitud.direccionEstablecimiento}"></span>
    </div>
    <div class="info-row">
      <span class="info-label">Vigente hasta</span>
      <span class="info-value text-success" th:text="${#temporals.format(nuevaFecha,'dd/MM/yyyy')}"></span>
    </div>
    <div class="info-row" style="border:none">
      <span class="info-label">Fecha de pago</span>
      <span class="info-value" th:text="${#temporals.format(#temporals.createNow(),'dd/MM/yyyy HH:mm')}"></span>
    </div>
    <div class="alert alert-info mt-4 mb-3">
      <i class="bi bi-envelope me-2"></i>
      Se ha enviado el comprobante a <strong th:text="${licencia.solicitud.correoElectronico}"></strong>
    </div>
    <div class="d-flex gap-2 mt-3">
      <a th:href="@{/publico/licencia/{id}/descargar(id=${licencia.id})}" class="btn btn-success w-100">
        <i class="bi bi-download me-1"></i>Descargar licencia PDF
      </a>
      <a href="/seguimiento" class="btn btn-outline-secondary w-100">
        <i class="bi bi-search me-1"></i>Ver estado
      </a>
    </div>
  </div>
</div>
</body>
</html>
