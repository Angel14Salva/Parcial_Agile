<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Mi panel | Licencias Municipales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --azul: #1D3557; --verde: #1D9E75; }
    body { background: #f0f4f8; }
    .navbar-brand { font-weight: 700; }
    .estado-badge { font-size: .78rem; padding: .35em .7em; border-radius: 20px; font-weight: 600; }
    .estado-BORRADOR { background:#e9ecef; color:#495057; }
    .estado-ADMITIDO, .estado-INSPECCION_PROGRAMADA { background:#cfe2ff; color:#0a3c8c; }
    .estado-OBSERVADO, .estado-SEGUNDA_INSPECCION_PROGRAMADA { background:#fff3cd; color:#664d03; }
    .estado-APROBADO { background:#d1e7dd; color:#0a3622; }
    .estado-DENEGADO { background:#f8d7da; color:#58151c; }
    .estado-PENDIENTE_VALIDACION { background:#e2d9f3; color:#3d1a78; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background: var(--azul)">
  <div class="container">
    <a class="navbar-brand" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white-50 small" sec:authentication="name"></span>
      <a href="/auth/logout" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </a>
    </div>
  </div>
</nav>

<div class="container">
  <!-- Alertas -->
  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0 fw-bold">Mi panel</h4>
      <p class="text-muted small mb-0" th:text="'Bienvenido, ' + ${usuario.nombreCompleto}"></p>
    </div>
    <a href="/solicitud/nueva" class="btn btn-primary">
      <i class="bi bi-plus-circle me-2"></i>Nueva solicitud
    </a>
  </div>

  <!-- Sin solicitudes -->
  <div th:if="${#lists.isEmpty(solicitudes)}" class="text-center py-5">
    <i class="bi bi-inbox text-muted" style="font-size:3rem"></i>
    <p class="text-muted mt-3">No tienes solicitudes aún.</p>
    <a href="/solicitud/nueva" class="btn btn-outline-primary">Iniciar trámite</a>
  </div>

  <!-- Lista de solicitudes -->
  <div class="row g-3" th:unless="${#lists.isEmpty(solicitudes)}">
    <div class="col-md-6" th:each="s : ${solicitudes}">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h6 class="card-title fw-bold mb-0" th:text="${s.razonSocial}">Razón Social</h6>
            <span class="estado-badge"
                  th:classappend="'estado-' + ${s.estado.name()}"
                  th:text="${s.estado.name().replace('_',' ')}">ESTADO</span>
          </div>
          <p class="text-muted small mb-1">
            <i class="bi bi-geo-alt me-1"></i><span th:text="${s.domicilioFiscal}"></span>
          </p>
          <p class="text-muted small mb-2">
            <i class="bi bi-tag me-1"></i><span th:text="${s.rubro}"></span>
          </p>
          <p class="text-muted small mb-3">
            <i class="bi bi-calendar me-1"></i>
            <span th:text="${#temporals.format(s.creadoEn, 'dd/MM/yyyy')}"></span>
          </p>

          <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/solicitud/{id}/detalle(id=${s.id})}"
               class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-eye me-1"></i>Ver detalle
            </a>
            <th:block th:if="${s.licencia != null and s.licencia.estado.name() != 'EXPIRADA' and s.licencia.estado.name() != 'REVOCADA'}">
              <a th:href="@{/licencia/{id}/descargar(id=${s.licencia.id})}"
                 class="btn btn-success btn-sm">
                <i class="bi bi-download me-1"></i>Descargar licencia
              </a>
            </th:block>
            <th:block th:if="${s.licencia != null and s.licencia.estado.name() == 'POR_VENCER'}">
              <a th:href="@{/licencia/{id}/renovar(id=${s.licencia.id})}"
                 class="btn btn-warning btn-sm">
                <i class="bi bi-arrow-clockwise me-1"></i>Renovar
              </a>
            </th:block>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
