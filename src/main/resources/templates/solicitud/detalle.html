<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Detalle solicitud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container"><a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a></div>
</nav>
<div class="container" style="max-width:700px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0">Detalle del trámite</h4>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-header fw-semibold d-flex justify-content-between">
      <span>Solicitud #<span th:text="${solicitud.id}"></span></span>
      <span class="badge bg-primary" th:text="${solicitud.estado.name().replace('_',' ')}"></span>
    </div>
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-4 text-muted">Razón social</dt>
        <dd class="col-sm-8 fw-bold" th:text="${solicitud.razonSocial}"></dd>
        <dt class="col-sm-4 text-muted">Domicilio fiscal</dt>
        <dd class="col-sm-8" th:text="${solicitud.domicilioFiscal}"></dd>
        <dt class="col-sm-4 text-muted">Rubro</dt>
        <dd class="col-sm-8" th:text="${solicitud.rubro}"></dd>
        <dt class="col-sm-4 text-muted">Validado SUNAT</dt>
        <dd class="col-sm-8">
          <span th:if="${solicitud.validadoSunat}" class="text-success fw-semibold">
            <i class="bi bi-check-circle me-1"></i>Sí
          </span>
          <span th:unless="${solicitud.validadoSunat}" class="text-danger">
            <i class="bi bi-x-circle me-1"></i>No
          </span>
        </dd>
        <dt class="col-sm-4 text-muted">Fecha pago</dt>
        <dd class="col-sm-8" th:text="${solicitud.fechaPago != null ? #temporals.format(solicitud.fechaPago,'dd/MM/yyyy HH:mm') : 'Pendiente'}"></dd>
        <dt class="col-sm-4 text-muted">Referencia pago</dt>
        <dd class="col-sm-8" th:text="${solicitud.referenciaPago ?: '-'}"></dd>
      </dl>
    </div>
  </div>

  <!-- Licencia emitida -->
  <div th:if="${licencia != null}" class="card shadow-sm mb-3 border-success">
    <div class="card-header bg-success text-white fw-semibold">
      <i class="bi bi-award me-2"></i>Licencia de funcionamiento
    </div>
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-4 text-muted">N.º licencia</dt>
        <dd class="col-sm-8 fw-bold" th:text="${licencia.numeroLicencia}"></dd>
        <dt class="col-sm-4 text-muted">Emitida</dt>
        <dd class="col-sm-8" th:text="${#temporals.format(licencia.fechaEmision,'dd/MM/yyyy')}"></dd>
        <dt class="col-sm-4 text-muted">Válida hasta</dt>
        <dd class="col-sm-8" th:text="${#temporals.format(licencia.fechaVencimiento,'dd/MM/yyyy')}"></dd>
        <dt class="col-sm-4 text-muted">Estado</dt>
        <dd class="col-sm-8" th:text="${licencia.estado.name()}"></dd>
      </dl>
      <div class="mt-3 d-flex gap-2">
        <a th:href="@{/licencia/{id}/descargar(id=${licencia.id})}"
           class="btn btn-success btn-sm"
           th:if="${licencia.estado.name() != 'EXPIRADA' and licencia.estado.name() != 'REVOCADA'}">
          <i class="bi bi-download me-1"></i>Descargar PDF
        </a>
        <a th:href="@{/licencia/{id}/renovar(id=${licencia.id})}"
           class="btn btn-warning btn-sm"
           th:if="${licencia.estado.name() == 'POR_VENCER'}">
          <i class="bi bi-arrow-clockwise me-1"></i>Renovar
        </a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
