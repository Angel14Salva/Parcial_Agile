<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Pago del trámite | Licencias Municipales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
  </div>
</nav>

<div class="container" style="max-width:560px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div>
      <h4 class="fw-bold mb-0">Pago del derecho de trámite</h4>
      <p class="text-muted small mb-0" th:text="${solicitud.razonSocial}"></p>
    </div>
  </div>

  <div th:if="${error}" class="alert alert-danger">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
  </div>

  <!-- Resumen -->
  <div class="card shadow-sm mb-4">
    <div class="card-header fw-semibold" style="background:#1D3557;color:#fff">
      <i class="bi bi-receipt me-2"></i>Resumen del trámite
    </div>
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-5 text-muted">Solicitud N°</dt>
        <dd class="col-sm-7 fw-bold" th:text="${solicitud.id}"></dd>
        <dt class="col-sm-5 text-muted">Razón social</dt>
        <dd class="col-sm-7" th:text="${solicitud.razonSocial}"></dd>
        <dt class="col-sm-5 text-muted">Establecimiento</dt>
        <dd class="col-sm-7" th:text="${solicitud.nombreComercial ?: solicitud.razonSocial}"></dd>
        <dt class="col-sm-5 text-muted">Dirección</dt>
        <dd class="col-sm-7 small" th:text="${solicitud.direccionEstablecimiento ?: solicitud.domicilioFiscal}"></dd>
      </dl>
    </div>
    <div class="card-footer d-flex justify-content-between align-items-center">
      <span class="text-muted">Derecho de trámite (Ley N°28976)</span>
      <span class="fw-bold fs-5 text-success">S/ 2.00</span>
    </div>
  </div>

  <!-- Botón de pago Flow -->
  <form th:action="@{/solicitud/{id}/pago/flow(id=${solicitud.id})}" method="post" class="mt-3">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">
      <i class="bi bi-credit-card me-2"></i>Seleccione su método de pago
    </button>
  </form>

  <!-- Simulación de pago: SOLO visible en perfil local (desarrollo), nunca en producción -->
  <div th:if="${esLocal}" class="mt-3">
    <div class="alert alert-warning small mb-2">
      <i class="bi bi-tools me-1"></i>Modo desarrollo local — no se conecta a Flow.
    </div>
    <form th:action="@{/solicitud/{id}/pago(id=${solicitud.id})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="referenciaPago" th:value="'SIMULADO-LOCAL-' + ${#dates.createNow().time}"/>
      <button type="submit" class="btn btn-outline-warning btn-lg w-100 fw-semibold">
        <i class="bi bi-flask me-2"></i>Simular pago (solo desarrollo)
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
