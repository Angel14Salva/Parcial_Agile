<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
  <meta charset="UTF-8"/><title>Panel Subgerente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white small" th:text="${usuario.nombreCompleto}"></span>
      <a href="/logout" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </a>
    </div>
  </div>
</nav>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-0">Panel del Subgerente</h4>
      <p class="text-muted small mb-0">
        Distrito: <strong th:text="${usuario.distrito?.name()?.replace('_',' ')}"></strong>
      </p>
    </div>
  </div>

  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Solicitudes pendientes de asignar inspector -->
  <h5 class="fw-semibold mb-3"><i class="bi bi-inbox me-2 text-warning"></i>Solicitudes sin inspector asignado</h5>
  <div th:if="${#lists.isEmpty(solicitudesPendientes)}" class="alert alert-light">No hay solicitudes pendientes.</div>
  <div class="row g-3 mb-4">
    <div class="col-md-6" th:each="s : ${solicitudesPendientes}">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <div>
              <div class="fw-bold" th:text="${s.razonSocial}"></div>
              <div class="text-muted small" th:text="${s.rubro}"></div>
              <div class="text-muted small" th:text="${s.direccionEstablecimiento}"></div>
            </div>
            <span class="badge bg-warning text-dark align-self-start" th:text="${s.estado.name()}"></span>
          </div>
          <form th:action="@{/subgerente/solicitud/{id}/asignar(id=${s.id})}" method="post" class="mt-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="input-group">
              <select name="inspectorId" class="form-select form-select-sm" required>
                <option value="">-- Asignar fiscalizador --</option>
                <option th:each="i : ${fiscalizadores}"
                        th:value="${i.id}"
                        th:text="${i.nombreCompleto}"></option>
              </select>
              <button type="submit" class="btn btn-primary btn-sm">Asignar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Todas las solicitudes del distrito -->
  <h5 class="fw-semibold mb-3"><i class="bi bi-list-ul me-2"></i>Todas las solicitudes del distrito</h5>
  <div class="table-responsive">
    <table class="table table-hover bg-white shadow-sm rounded">
      <thead style="background:#1D3557;color:#fff">
        <tr>
          <th>Negocio</th>
          <th>Rubro</th>
          <th>Estado</th>
          <th>Inspector</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${todasSolicitudes}">
          <td class="fw-semibold small" th:text="${s.razonSocial}"></td>
          <td class="small text-muted" th:text="${s.rubro}"></td>
          <td>
            <span class="badge"
                  th:classappend="${s.estado.name() == 'APROBADO'} ? 'bg-success' :
                                   (${s.estado.name() == 'DENEGADO'} ? 'bg-danger' :
                                   (${s.estado.name() == 'OBSERVADO'} ? 'bg-warning text-dark' : 'bg-secondary'))"
                  th:text="${s.estado.name().replace('_',' ')}"></span>
          </td>
          <td class="small" th:text="${s.inspector?.nombreCompleto ?: 'Sin asignar'}"></td>
          <td>
            <a th:href="@{/solicitud/{id}/detalle(id=${s.id})}" class="btn btn-outline-primary btn-sm">
              <i class="bi bi-eye"></i>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Fiscalizadores del distrito -->
  <h5 class="fw-semibold mb-3 mt-4"><i class="bi bi-people me-2"></i>Fiscalizadores del distrito</h5>
  <div class="table-responsive">
    <table class="table table-hover bg-white shadow-sm rounded">
      <thead style="background:#457B9D;color:#fff">
        <tr><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Estado</th></tr>
      </thead>
      <tbody>
        <tr th:each="f : ${fiscalizadores}">
          <td th:text="${f.nombreCompleto}"></td>
          <td th:text="${f.dni ?: '-'}"></td>
          <td th:text="${f.telefono ?: '-'}"></td>
          <td>
            <span th:if="${f.activo}" class="badge bg-success">Activo</span>
            <span th:unless="${f.activo}" class="badge bg-secondary">Inactivo</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
