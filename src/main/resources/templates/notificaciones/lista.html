<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><title>Notificaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; }
    .notif-card { border-left: 4px solid #1D9E75; }
    .notif-card.no-leida { border-left-color: #0d6efd; background: #f0f7ff; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
      <a href="/notificaciones" class="btn btn-outline-light btn-sm position-relative">
        <i class="bi bi-bell"></i>
        <span th:if="${notifCount > 0}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" th:text="${notifCount}"></span>
      </a>
      <form action="/auth/logout" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </form>
    </div>
  </div>
</nav>

<div class="container" style="max-width:700px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">Notificaciones</h4>
  </div>

  <div th:if="${#lists.isEmpty(notificaciones)}" class="text-center py-5">
    <i class="bi bi-bell-slash text-muted" style="font-size:3rem"></i>
    <p class="text-muted mt-3">No tienes notificaciones.</p>
  </div>

  <div th:each="n : ${notificaciones}"
       class="card shadow-sm mb-3 notif-card"
       th:classappend="${!n.leida} ? 'no-leida'">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start mb-1">
        <h6 class="fw-bold mb-0">
          <i class="bi bi-bell me-2 text-primary" th:unless="${n.leida}"></i>
          <i class="bi bi-bell-slash me-2 text-muted" th:if="${n.leida}"></i>
          <span th:text="${n.titulo}"></span>
        </h6>
        <small class="text-muted"
               th:text="${#temporals.format(n.creadoEn,'dd/MM/yyyy HH:mm')}"></small>
      </div>
      <p class="mb-0 text-secondary small" th:text="${n.mensaje}"></p>
      <!-- Link contextual -->
      <div class="mt-2">
        <a th:if="${n.getEnlace() != null}"
           th:href="${n.getEnlace()}" class="btn btn-outline-primary btn-sm">
          <i class="bi bi-arrow-right-circle me-1"></i>Ver detalle
        </a>
        <a th:if="${n.getEnlace() == null}"
           href="/dashboard" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-house me-1"></i>Ir al dashboard
        </a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
