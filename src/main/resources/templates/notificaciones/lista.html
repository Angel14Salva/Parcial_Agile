<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><title>Notificaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; }
    .notif-card       { border-left: 4px solid #1D9E75; }
    .notif-card.multa { border-left-color: #dc3545; background: #fff5f5; }
    .notif-card.no-leida { border-left-color: #0d6efd; background: #f0f7ff; }
    .notif-card.multa.no-leida { border-left-color: #dc3545; background: #ffe8e8; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
      <form action="/auth/logout" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </form>
    </div>
  </div>
</nav>

<div class="container" style="max-width:700px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">Notificaciones</h4>
  </div>

  <div th:if="${#lists.isEmpty(notificaciones)}" class="text-center py-5">
    <i class="bi bi-bell-slash text-muted" style="font-size:3rem"></i>
    <p class="text-muted mt-3">No tienes notificaciones.</p>
  </div>

  <div th:each="n : ${notificaciones}"
       class="card shadow-sm mb-3 notif-card"
       th:classappend="${n.titulo.contains('multa') or n.titulo.contains('Multa')} ? 'multa' : (${!n.leida} ? 'no-leida' : '')">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start mb-1">
        <h6 class="fw-bold mb-0">
          <!-- Icono segun tipo -->
          <i th:if="${n.titulo.contains('multa') or n.titulo.contains('Multa')}"
             class="bi bi-exclamation-octagon-fill text-danger me-2"></i>
          <i th:if="${n.titulo.contains('Inspección') or n.titulo.contains('aprobada')}"
             class="bi bi-clipboard-check text-success me-2"></i>
          <i th:if="${n.titulo.contains('observaci') or n.titulo.contains('Segunda')}"
             class="bi bi-exclamation-triangle text-warning me-2"></i>
          <i th:if="${n.titulo.contains('licencia') or n.titulo.contains('Pago') or n.titulo.contains('pagada')}"
             class="bi bi-award text-success me-2"></i>
          <i th:if="${!n.titulo.contains('multa') and !n.titulo.contains('Multa')
                    and !n.titulo.contains('Inspección') and !n.titulo.contains('aprobada')
                    and !n.titulo.contains('observaci') and !n.titulo.contains('Segunda')
                    and !n.titulo.contains('licencia') and !n.titulo.contains('Pago') and !n.titulo.contains('pagada')}"
             class="bi bi-bell text-primary me-2"></i>
          <span th:text="${n.titulo}"
                th:classappend="${n.titulo.contains('multa') or n.titulo.contains('Multa')} ? 'text-danger'"></span>
        </h6>
        <small class="text-muted ms-2 text-nowrap"
               th:text="${#temporals.format(n.creadoEn,'dd/MM/yyyy HH:mm')}"></small>
      </div>

      <p class="mb-2 text-secondary small" th:text="${n.mensaje}"></p>

      <!-- Boton de accion -->
      <div>
        <!-- Si tiene enlace directo (multas, etc) -->
        <a th:if="${n.enlace != null and !n.enlace.isEmpty()}"
           th:href="${n.enlace}"
           th:class="${n.titulo.contains('multa') or n.titulo.contains('Multa')}
                      ? 'btn btn-danger btn-sm'
                      : 'btn btn-outline-primary btn-sm'">
          <i th:if="${n.titulo.contains('multa') or n.titulo.contains('Multa')}"
             class="bi bi-exclamation-octagon me-1"></i>
          <i th:unless="${n.titulo.contains('multa') or n.titulo.contains('Multa')}"
             class="bi bi-arrow-right-circle me-1"></i>
          <span th:if="${n.titulo.contains('multa') or n.titulo.contains('Multa')}">Ver multa y pagar</span>
          <span th:unless="${n.titulo.contains('multa') or n.titulo.contains('Multa')}">Ver detalle</span>
        </a>
        <!-- Si no tiene enlace, ir al dashboard -->
        <a th:if="${n.enlace == null or n.enlace.isEmpty()}"
           href="/dashboard" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-house me-1"></i>Ir al dashboard
        </a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
