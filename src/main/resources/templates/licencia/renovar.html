<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Renovar licencia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container"><a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a></div>
</nav>
<div class="container" style="max-width:560px">
  <h4 class="fw-bold mb-1">Renovar licencia</h4>
  <p class="text-muted small mb-4">Renovación anual — mismo local.</p>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <dl class="row mb-0 small">
        <dt class="col-sm-4 text-muted">N.º licencia</dt>
        <dd class="col-sm-8 fw-bold" th:text="${licencia.numeroLicencia}"></dd>
        <dt class="col-sm-4 text-muted">Vence el</dt>
        <dd class="col-sm-8" th:text="${#temporals.format(licencia.fechaVencimiento,'dd/MM/yyyy')}"></dd>
        <dt class="col-sm-4 text-muted">Estado</dt>
        <dd class="col-sm-8" th:text="${licencia.estado.name()}"></dd>
      </dl>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between mb-4 p-3 rounded"
           style="background:#f8f9fa;border:2px dashed #1D9E75">
        <span class="fw-semibold">Derecho de renovación</span>
        <span class="fs-4 fw-bold text-success">S/ 180.00</span>
      </div>
      <form th:action="@{/licencia/{id}/renovar(id=${licencia.id})}" method="post">
        <div class="mb-4">
          <label class="form-label fw-semibold">Referencia de pago <span class="text-danger">*</span></label>
          <input type="text" name="referenciaPago" class="form-control"
                 placeholder="Ej: OP-20251201-042" required minlength="5"/>
        </div>
        <div class="alert alert-warning py-2 small mb-4">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Si cambió el local u otros datos, deberá iniciar un nuevo trámite.
        </div>
        <div class="d-flex gap-2">
          <a href="/dashboard" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-success fw-semibold">
            <i class="bi bi-arrow-clockwise me-2"></i>Renovar licencia
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
