<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Subsanar observaciones | Caja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/cajero/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
    </div>
  </div>
</nav>

<div class="container" style="max-width:560px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/cajero/dashboard">Panel de caja</a></li>
      <li class="breadcrumb-item active">Subsanar observaciones</li>
    </ol>
  </nav>

  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <h4 class="fw-bold mb-1"><i class="bi bi-arrow-repeat me-2 text-warning"></i>Subsanar observaciones</h4>
  <p class="text-muted small mb-4">Atiende a un negocio que viene a corregir las observaciones de su inspección. Búscalo por su código de seguimiento.</p>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <label class="form-label fw-semibold">Código de seguimiento</label>
      <form th:action="@{/cajero/subsanar/buscar}" method="post">
        <div class="input-group">
          <input type="text" name="codigo" class="form-control form-control-lg"
                 placeholder="Ej: TRJ-2026-XXXX" required/>
          <button type="submit" class="btn btn-warning">
            <i class="bi bi-search me-1"></i>Buscar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
