<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Pago con QR | Caja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/cajero/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
    </div>
  </div>
</nav>

<div class="container" style="max-width:560px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/cajero/dashboard">Panel de caja</a></li>
      <li class="breadcrumb-item"><a href="/cajero/nueva">Nuevo trámite</a></li>
      <li class="breadcrumb-item active">Pago con QR</li>
    </ol>
  </nav>

  <h4 class="fw-bold mb-1"><i class="bi bi-qr-code me-2 text-primary"></i>Pago con QR / pasarela</h4>
  <p class="text-muted small mb-4" th:text="${razonSocial} + ' — RUC ' + ${ruc}"></p>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="card shadow-sm mb-4">
    <div class="card-body p-4">
      <dl class="row mb-0">
        <dt class="col-sm-5 text-muted">Negocio</dt>
        <dd class="col-sm-7" th:text="${razonSocial}"></dd>
        <dt class="col-sm-5 text-muted">RUC</dt>
        <dd class="col-sm-7" th:text="${ruc}"></dd>
      </dl>
    </div>
    <div class="card-footer d-flex justify-content-between align-items-center">
      <span class="text-muted">Derecho de trámite</span>
      <span class="fw-bold fs-5 text-success"
            th:text="'S/ ' + ${#numbers.formatDecimal(montoTramite, 1, 2)}"></span>
    </div>
  </div>

  <p class="text-muted small mb-3">
    <i class="bi bi-info-circle me-1"></i>
    Al continuar, se abrirá la pasarela de pago donde el cliente podrá elegir su método preferido (QR, tarjeta, etc.).
  </p>

  <form th:action="@{/cajero/pago/qr/iniciar}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="ruc" th:value="${ruc}"/>
    <input type="hidden" name="razonSocial" th:value="${razonSocial}"/>
    <input type="hidden" name="direccion" th:value="${direccion}"/>
    <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
      <i class="bi bi-credit-card me-2"></i>Ir a la pasarela de pago
    </button>
  </form>
</div>
</body>
</html>
