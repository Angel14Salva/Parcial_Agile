<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Cobrar renovación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/cajero/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
    </div>
  </div>
</nav>

<div class="container" style="max-width:680px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/cajero/dashboard">Panel de caja</a></li>
      <li class="breadcrumb-item active">Cobrar renovación</li>
    </ol>
  </nav>

  <h5 class="fw-bold mb-3"><i class="bi bi-search me-2"></i>Buscar licencia por RUC</h5>

  <form th:action="@{/cajero/renovar}" method="get" class="d-flex gap-2 mb-4">
    <input type="text" name="ruc" class="form-control" placeholder="N° de RUC (11 dígitos)"
           maxlength="11" pattern="\d{11}" th:value="${ruc}" required/>
    <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Buscar</button>
  </form>

  <div th:if="${error}" class="alert alert-warning">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
  </div>

  <div th:if="${licencia}" class="card shadow-sm">
    <div class="card-body">
      <h5 class="fw-semibold mb-3"><i class="bi bi-file-earmark-check text-success me-2"></i>Licencia encontrada</h5>
      <table class="table table-sm">
        <tr><th>N° de licencia</th><td th:text="${licencia.numeroLicencia}"></td></tr>
        <tr><th>Negocio</th><td th:text="${licencia.solicitud.razonSocial}"></td></tr>
        <tr><th>Nombre comercial</th><td th:text="${licencia.solicitud.nombreComercial}"></td></tr>
        <tr><th>RUC</th><td th:text="${licencia.solicitud.ruc}"></td></tr>
        <tr><th>Estado actual</th><td th:text="${licencia.estado}"></td></tr>
        <tr><th>Vence</th><td th:text="${#temporals.format(licencia.fechaVencimiento, 'dd/MM/yyyy')}"></td></tr>
      </table>
      <div th:if="${licencia.estado.name() == 'REVOCADA'}" class="alert alert-danger">
        Esta licencia fue revocada y no puede renovarse.
      </div>
      <form th:unless="${licencia.estado.name() == 'REVOCADA'}"
            th:action="@{'/cajero/licencia/' + ${licencia.id} + '/renovar'}" method="post"
            onsubmit="return confirm('¿Confirmas el cobro de S/180.00 por la renovación de esta licencia?');">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-cash-coin me-1"></i>Cobrar renovación (S/180.00) y extender 1 año
        </button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
