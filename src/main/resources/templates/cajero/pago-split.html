<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Pago dividido | Caja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/cajero/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
    </div>
  </div>
</nav>

<div class="container" style="max-width:700px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/cajero/dashboard">Panel de caja</a></li>
      <li class="breadcrumb-item"><a href="/cajero/nueva">Nuevo trámite</a></li>
      <li class="breadcrumb-item active" th:text="${metodo == 'qr'} ? 'Pago con QR' : 'Pago híbrido'"></li>
    </ol>
  </nav>

  <h4 class="fw-bold mb-1">
    <i class="bi bi-qr-code me-2 text-primary" th:if="${metodo == 'qr'}"></i>
    <i class="bi bi-shuffle me-2 text-primary" th:unless="${metodo == 'qr'}"></i>
    <span th:text="${metodo == 'qr'} ? 'Pago con QR en varias partes' : 'Pago híbrido (efectivo + QR)'"></span>
  </h4>
  <p class="text-muted small mb-4" th:text="${razonSocial} + ' — RUC ' + ${ruc}"></p>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="card shadow-sm mb-4">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted">Total del trámite</span>
        <span class="fw-bold fs-4 text-success" id="montoTotalLabel"
              th:text="'S/ ' + ${#numbers.formatDecimal(montoTramite, 1, 2)}"
              th:data-total="${montoTramite}"></span>
      </div>
      <label class="form-label fw-semibold">¿En cuántas partes se va a pagar?</label>
      <div class="input-group" style="max-width:260px">
        <input type="number" id="inputPartes" class="form-control" value="2" min="1" max="5"/>
        <button type="button" id="btnGenerar" class="btn btn-outline-primary">
          <i class="bi bi-list-ol me-1"></i>Generar partes
        </button>
      </div>
      <div class="field-hint text-muted mt-1" style="font-size:.8rem" th:if="${metodo == 'qr'}">
        Cada parte pagada por QR debe ser de al menos S/ 2.00 (mínimo de la pasarela de pago).
      </div>
    </div>
  </div>

  <div id="partesContainer"></div>

  <div class="card shadow-sm mb-4" id="resumenCard" style="display:none">
    <div class="card-body d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Suma de partes</span>
      <span id="sumaLabel" class="fw-bold fs-5">S/ 0.00</span>
    </div>
  </div>

  <div class="d-flex gap-2 mb-5">
    <a href="/cajero/pago/nuevo" class="btn btn-outline-secondary">
      <i class="bi bi-x me-1"></i>Cancelar
    </a>
    <form th:action="@{/cajero/pago/split/finalizar}" method="post" id="formFinalizar" class="flex-grow-1">
      <input type="hidden" name="grupoPago" th:value="${grupoPago}"/>
      <input type="hidden" name="ruc" th:value="${ruc}"/>
      <input type="hidden" name="razonSocial" th:value="${razonSocial}"/>
      <input type="hidden" name="direccion" th:value="${direccion}"/>
      <input type="hidden" name="email" th:value="${email}"/>
      <button type="submit" class="btn btn-primary w-100" id="btnContinuar" disabled>
        <i class="bi bi-check-circle me-1"></i>Continuar
      </button>
    </form>
  </div>
</div>

<script th:inline="javascript">
  const RUC          = /*[[${ruc}]]*/ '';
  const RAZON_SOCIAL  = /*[[${razonSocial}]]*/ '';
  const DIRECCION     = /*[[${direccion}]]*/ '';
  const EMAIL         = /*[[${email}]]*/ '';
  const METODO        = /*[[${metodo}]]*/ 'hibrido';
  const GRUPO_PAGO     = /*[[${grupoPago}]]*/ '';
  const MONTO_TOTAL    = Number(/*[[${montoTramite}]]*/ 0);
  const SOLO_QR        = METODO === 'qr';
  const CSRF_TOKEN     = /*[[${_csrf.token}]]*/ '';
  const CSRF_HEADER    = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';

  let partes = []; // { monto, metodo: 'qr'|'efectivo', facturaId, estado: 'pendiente'|'esperando'|'pagado' }
  let polling = null;

  function crearFilas(n) {
    partes = [];
    const montoParte = (MONTO_TOTAL / n).toFixed(2);
    for (let i = 0; i < n; i++) {
      partes.push({ monto: montoParte, metodo: SOLO_QR ? 'qr' : 'efectivo', facturaId: null, estado: 'pendiente' });
    }
    render();
  }

  function render() {
    const cont = document.getElementById('partesContainer');
    cont.innerHTML = '';
    partes.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'card shadow-sm mb-3';
      const pagado = p.estado === 'pagado';
      div.innerHTML = `
        <div class="card-body p-3">
          <div class="row g-2 align-items-center">
            <div class="col-auto fw-semibold">Parte ${i + 1}</div>
            <div class="col-md-3">
              <div class="input-group input-group-sm">
                <span class="input-group-text">S/</span>
                <input type="number" step="0.01" min="0" class="form-control monto-input"
                       value="${p.monto}" ${pagado ? 'disabled' : ''}/>
              </div>
            </div>
            <div class="col-md-3">
              ${SOLO_QR ? '<span class="badge bg-primary">QR</span>' : `
              <select class="form-select form-select-sm metodo-select" ${pagado ? 'disabled' : ''}>
                <option value="efectivo" ${p.metodo === 'efectivo' ? 'selected' : ''}>Efectivo</option>
                <option value="qr" ${p.metodo === 'qr' ? 'selected' : ''}>QR</option>
              </select>`}
            </div>
            <div class="col-md-3 recibido-col" style="${p.metodo === 'efectivo' && !pagado ? '' : 'display:none'}">
              <div class="input-group input-group-sm">
                <span class="input-group-text">Recibido</span>
                <input type="number" step="0.01" min="0" class="form-control recibido-input"/>
              </div>
            </div>
            <div class="col text-end accion-col"></div>
          </div>
          <div class="small mt-2 status-msg"></div>
        </div>`;
      cont.appendChild(div);

      const montoInput   = div.querySelector('.monto-input');
      const metodoSelect = div.querySelector('.metodo-select');
      const recibidoCol  = div.querySelector('.recibido-col');
      const accionCol    = div.querySelector('.accion-col');
      const statusMsg     = div.querySelector('.status-msg');

      montoInput.addEventListener('input', () => { p.monto = montoInput.value; actualizarSuma(); });

      if (metodoSelect) {
        metodoSelect.addEventListener('change', () => {
          p.metodo = metodoSelect.value;
          recibidoCol.style.display = p.metodo === 'efectivo' ? '' : 'none';
          render();
        });
      }

      if (pagado) {
        accionCol.innerHTML = '<span class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Pagado</span>';
      } else if (p.metodo === 'qr') {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-primary btn-sm';
        btn.innerHTML = p.estado === 'esperando'
          ? '<i class="bi bi-hourglass-split me-1"></i>Esperando pago...'
          : '<i class="bi bi-qr-code me-1"></i>Generar QR';
        btn.addEventListener('click', () => generarQr(i));
        accionCol.appendChild(btn);
      } else {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-success btn-sm';
        btn.innerHTML = '<i class="bi bi-cash me-1"></i>Confirmar efectivo';
        btn.addEventListener('click', () => confirmarEfectivo(i, div));
        accionCol.appendChild(btn);
      }

      if (p.estado === 'error') {
        statusMsg.innerHTML = '<span class="text-danger">' + (p.errorMsg || 'Error al procesar esta parte.') + '</span>';
      }
    });
    actualizarSuma();
  }

  function actualizarSuma() {
    document.getElementById('resumenCard').style.display = '';
    const suma = partes.reduce((acc, p) => acc + (parseFloat(p.monto) || 0), 0);
    const label = document.getElementById('sumaLabel');
    label.textContent = 'S/ ' + suma.toFixed(2) + ' de S/ ' + MONTO_TOTAL.toFixed(2);
    label.className = Math.abs(suma - MONTO_TOTAL) < 0.001 ? 'fw-bold fs-5 text-success' : 'fw-bold fs-5 text-danger';
    revisarCompleto();
  }

  function revisarCompleto() {
    const todosPagados = partes.length > 0 && partes.every(p => p.estado === 'pagado');
    document.getElementById('btnContinuar').disabled = !todosPagados;
  }

  async function generarQr(i) {
    const p = partes[i];
    const monto = parseFloat(p.monto);
    if (!monto || monto < 2) {
      p.estado = 'error';
      p.errorMsg = 'El monto de esta parte debe ser de al menos S/ 2.00.';
      render();
      return;
    }
    p.estado = 'esperando';
    render();
    try {
      const body = new URLSearchParams({ ruc: RUC, razonSocial: RAZON_SOCIAL, direccion: DIRECCION || '',
        email: EMAIL, monto: monto.toFixed(2), grupoPago: GRUPO_PAGO });
      const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
      headers[CSRF_HEADER] = CSRF_TOKEN;
      const res = await fetch('/cajero/pago/split/parte/qr', { method: 'POST', headers, body });
      const data = await res.json();
      if (!data.ok) {
        p.estado = 'error';
        p.errorMsg = data.error || 'No se pudo generar el QR.';
        render();
        return;
      }
      p.facturaId = data.facturaId;
      window.open(data.urlPago, '_blank');
      iniciarPolling();
    } catch (e) {
      p.estado = 'error';
      p.errorMsg = 'Error de conexión.';
      render();
    }
  }

  async function confirmarEfectivo(i, div) {
    const p = partes[i];
    const monto = parseFloat(p.monto);
    const recibidoInput = div.querySelector('.recibido-input');
    const recibido = parseFloat(recibidoInput.value);
    if (!monto || monto <= 0) { alert('Ingresa un monto válido para esta parte.'); return; }
    if (!recibido || recibido < monto) { alert('El monto recibido debe cubrir esta parte (S/ ' + monto.toFixed(2) + ').'); return; }
    try {
      const body = new URLSearchParams({ ruc: RUC, razonSocial: RAZON_SOCIAL, direccion: DIRECCION || '',
        email: EMAIL, monto: monto.toFixed(2), montoRecibido: recibido.toFixed(2), grupoPago: GRUPO_PAGO });
      const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
      headers[CSRF_HEADER] = CSRF_TOKEN;
      const res = await fetch('/cajero/pago/split/parte/efectivo', { method: 'POST', headers, body });
      const data = await res.json();
      if (!data.ok) { alert(data.error || 'No se pudo confirmar el pago en efectivo.'); return; }
      p.estado = 'pagado';
      p.facturaId = data.facturaId;
      if (Number(data.vuelto) > 0) alert('Vuelto de esta parte: S/ ' + Number(data.vuelto).toFixed(2));
      render();
    } catch (e) {
      alert('Error de conexión.');
    }
  }

  function iniciarPolling() {
    if (polling) return;
    polling = setInterval(async () => {
      try {
        const res = await fetch('/cajero/pago/split/estado?grupoPago=' + encodeURIComponent(GRUPO_PAGO));
        const data = await res.json();
        let cambio = false;
        data.partes.forEach(dp => {
          const local = partes.find(p => p.facturaId === dp.facturaId);
          if (local && dp.estado === 'PAGADA' && local.estado !== 'pagado') {
            local.estado = 'pagado';
            cambio = true;
          }
        });
        if (cambio) render();
        if (partes.every(p => p.estado !== 'esperando')) {
          clearInterval(polling);
          polling = null;
        }
      } catch (e) { /* seguir intentando */ }
    }, 3000);
  }

  document.getElementById('btnGenerar').addEventListener('click', () => {
    const n = Math.max(1, Math.min(5, parseInt(document.getElementById('inputPartes').value) || 1));
    crearFilas(n);
  });

  document.getElementById('formFinalizar').addEventListener('submit', (e) => {
    if (document.getElementById('btnContinuar').disabled) e.preventDefault();
  });

  crearFilas(2);
</script>
</body>
</html>
