<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Pago en efectivo | Caja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/cajero/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
    </div>
  </div>
</nav>

<div class="container" style="max-width:560px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/cajero/dashboard">Panel de caja</a></li>
      <li class="breadcrumb-item"><a href="/cajero/nueva">Nuevo trámite</a></li>
      <li class="breadcrumb-item active">Pago en efectivo</li>
    </ol>
  </nav>

  <h4 class="fw-bold mb-1"><i class="bi bi-cash-stack me-2 text-success"></i>Cobro en efectivo</h4>
  <p class="text-muted small mb-4" th:text="${razonSocial} + ' — RUC ' + ${ruc}"></p>

  <div id="alertaError" class="alert alert-danger d-none"></div>
  <div id="alertaExito" class="alert alert-success d-none"></div>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <label class="form-label fw-semibold text-muted">Monto a pagar</label>
      <input type="text" class="form-control form-control-lg mb-3 fw-bold text-success"
             th:value="'S/ ' + ${#numbers.formatDecimal(montoTramite, 1, 2)}" readonly/>

      <label class="form-label fw-semibold">Monto recibido del cliente <span class="text-danger">*</span></label>
      <input type="text" id="inputRecibido" class="form-control form-control-lg mb-3"
             inputmode="decimal" placeholder="0.00"
             oninput="this.value=this.value.replace(/[^0-9.]/g,''); calcularVuelto();"/>

      <label class="form-label fw-semibold">Vuelto</label>
      <input type="text" id="inputVuelto" class="form-control form-control-lg mb-4 fw-bold" readonly value="0.00"/>

      <div class="d-grid gap-2">
        <button type="button" id="btnConfirmar" class="btn btn-success btn-lg">
          <i class="bi bi-check-circle me-2"></i>Confirmar pago
        </button>
        <a id="btnImprimir" href="#" target="_blank" class="btn btn-outline-primary btn-lg disabled">
          <i class="bi bi-printer me-2"></i>Imprimir factura
        </a>
        <a id="btnContinuar" href="#" class="btn btn-primary btn-lg d-none">
          <i class="bi bi-arrow-right-circle me-2"></i>Continuar al formulario del trámite
        </a>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  const MONTO_TRAMITE = /*[[${montoTramite}]]*/ 2.00;
  const RUC = /*[[${ruc}]]*/ '';
  const RAZON_SOCIAL = /*[[${razonSocial}]]*/ '';
  const DIRECCION = /*[[${direccion}]]*/ '';
  const EMAIL = /*[[${email}]]*/ '';
  const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
  const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';

  function calcularVuelto() {
    const recibido = parseFloat(document.getElementById('inputRecibido').value) || 0;
    const vuelto = Math.max(0, recibido - MONTO_TRAMITE);
    document.getElementById('inputVuelto').value = vuelto.toFixed(2);
  }

  document.getElementById('btnConfirmar').addEventListener('click', async () => {
    const errDiv = document.getElementById('alertaError');
    const okDiv = document.getElementById('alertaExito');
    errDiv.classList.add('d-none');
    const recibido = parseFloat(document.getElementById('inputRecibido').value);
    if (!recibido || recibido < MONTO_TRAMITE) {
      errDiv.textContent = `El monto recibido debe ser al menos S/ ${MONTO_TRAMITE.toFixed(2)}.`;
      errDiv.classList.remove('d-none');
      return;
    }
    const body = new URLSearchParams({
      ruc: RUC, razonSocial: RAZON_SOCIAL, direccion: DIRECCION, email: EMAIL,
      montoRecibido: recibido.toFixed(2)
    });
    try {
      const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
      headers[CSRF_HEADER] = CSRF_TOKEN;
      const res = await fetch('/cajero/pago/efectivo/confirmar', {
        method: 'POST', headers, body
      });
      const data = await res.json();
      if (!data.ok) {
        errDiv.textContent = data.error || 'No se pudo confirmar el pago.';
        errDiv.classList.remove('d-none');
        return;
      }
      okDiv.textContent = 'Pago confirmado. N.° de operación: ' + data.numeroOperacion;
      okDiv.classList.remove('d-none');

      const btnImprimir = document.getElementById('btnImprimir');
      btnImprimir.href = '/cajero/factura/' + data.facturaId;
      btnImprimir.classList.remove('disabled');

      const btnContinuar = document.getElementById('btnContinuar');
      const params = new URLSearchParams({
        operacion: data.numeroOperacion, ruc: RUC, razonSocial: RAZON_SOCIAL,
        direccion: DIRECCION, email: EMAIL
      });
      btnContinuar.href = '/cajero/nueva/datos?' + params.toString();
      btnContinuar.classList.remove('d-none');

      document.getElementById('btnConfirmar').disabled = true;
      document.getElementById('inputRecibido').disabled = true;
    } catch (e) {
      errDiv.textContent = 'Error de conexión al confirmar el pago.';
      errDiv.classList.remove('d-none');
    }
  });
</script>
</body>
</html>
