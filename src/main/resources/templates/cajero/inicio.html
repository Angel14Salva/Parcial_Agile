<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Nuevo trámite | Caja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/cajero/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
    </div>
  </div>
</nav>

<div class="container" style="max-width:560px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/cajero/dashboard">Panel de caja</a></li>
      <li class="breadcrumb-item active">Nuevo trámite</li>
    </ol>
  </nav>

  <h4 class="fw-bold mb-1"><i class="bi bi-file-earmark-plus me-2 text-primary"></i>Registrar solicitud presencial</h4>
  <p class="text-muted small mb-4">Primero indica si el negocio ya cuenta con un número de operación de pago, o si debes cobrarle el trámite ahora.</p>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <label class="form-label fw-semibold">N.° de operación de pago (si ya lo tiene)</label>
      <input type="text" id="inputOperacion" class="form-control form-control-lg mb-3"
             placeholder="Ej: código de depósito, transferencia, etc."/>
      <div class="d-grid gap-2">
        <button type="button" id="btnSiguiente" class="btn btn-primary btn-lg">
          <i class="bi bi-arrow-right-circle me-2"></i>Siguiente (ya tiene N.° de operación)
        </button>
        <div class="text-center text-muted small my-1">— o —</div>
        <button type="button" id="btnPagar" class="btn btn-success btn-lg">
          <i class="bi bi-cash-coin me-2"></i>Pagar trámite (aún no tiene N.° de operación)
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('btnSiguiente').addEventListener('click', () => {
    const op = document.getElementById('inputOperacion').value.trim();
    if (!op) {
      alert('Ingresa el número de operación, o usa el botón "Pagar trámite" si el cliente aún no ha pagado.');
      return;
    }
    window.location.href = '/cajero/nueva/datos?operacion=' + encodeURIComponent(op);
  });
  document.getElementById('btnPagar').addEventListener('click', () => {
    window.location.href = '/cajero/pago/nuevo';
  });
</script>
</body>
</html>
