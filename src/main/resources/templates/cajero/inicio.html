<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Nuevo trámite | Caja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/cajero/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
    </div>
  </div>
</nav>

<div class="container" style="max-width:560px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/cajero/dashboard">Panel de caja</a></li>
      <li class="breadcrumb-item active">Nuevo trámite</li>
    </ol>
  </nav>

  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <h4 class="fw-bold mb-1"><i class="bi bi-file-earmark-plus me-2 text-primary"></i>Registrar solicitud presencial</h4>
  <p class="text-muted small mb-4">Primero indica si el negocio ya cuenta con un número de operación de pago, o si debes cobrarle el trámite ahora.</p>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form th:action="@{/cajero/nueva/validar-operacion}" method="post">
        <label class="form-label fw-semibold">N.° de operación de pago (si ya lo tiene)</label>
        <input type="text" name="operacion" class="form-control form-control-lg mb-3"
               placeholder="Ej: código de depósito, transferencia, etc." required/>
        <button type="submit" class="btn btn-primary btn-lg w-100">
          <i class="bi bi-check-circle me-2"></i>Validar número de operación
        </button>
      </form>
      <div class="text-center text-muted small my-3">— o —</div>
      <a href="/cajero/pago/nuevo" class="btn btn-success btn-lg w-100">
        <i class="bi bi-cash-coin me-2"></i>Pagar en caja (aún no tiene N.° de operación)
      </a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
