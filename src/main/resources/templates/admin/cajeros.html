<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Cajeros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a>
  </div>
</nav>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
      <a href="/dashboard" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
      <h4 class="fw-bold mb-0">Cajeros</h4>
    </div>
    <a href="/admin/cajeros/nuevo" class="btn btn-primary">
      <i class="bi bi-person-plus me-1"></i>Nuevo cajero
    </a>
  </div>

  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover bg-white shadow-sm rounded">
      <thead style="background:#1D3557;color:#fff">
        <tr>
          <th>Nombre completo</th>
          <th>Usuario</th>
          <th>Correo</th>
          <th>Teléfono</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="c : ${cajeros}" th:classappend="${!c.activo} ? 'table-secondary opacity-75'">
          <td class="fw-semibold small" th:text="${c.nombreCompleto}"></td>
          <td class="text-muted small" th:text="${c.username}"></td>
          <td class="small" th:text="${c.email}"></td>
          <td class="small" th:text="${c.telefono ?: '-'}"></td>
          <td>
            <span th:if="${c.activo}" class="badge bg-success">Activo</span>
            <span th:unless="${c.activo}" class="badge bg-secondary">Inactivo</span>
          </td>
          <td>
            <form th:action="@{/admin/cajeros/{id}/desactivar(id=${c.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-sm"
                      th:classappend="${c.activo} ? 'btn-outline-warning' : 'btn-outline-success'"
                      th:title="${c.activo} ? 'Desactivar' : 'Activar'">
                <i th:classappend="${c.activo} ? 'bi bi-person-dash' : 'bi bi-person-check'" class="bi"></i>
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
