<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Inspector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a>
  </div>
</nav>
<div class="container" style="max-width:700px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/admin/inspectores" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0"
        th:text="${inspectorId != null} ? 'Editar inspector' : 'Nuevo inspector'"></h4>
  </div>

  <div class="card shadow-sm">
    <div class="card-header fw-semibold" style="background:#1D3557;color:#fff">
      <i class="bi bi-person-badge me-2"></i>Datos del inspector
    </div>
    <div class="card-body p-4">
      <form th:action="${inspectorId != null} ? @{/admin/inspectores/{id}/editar(id=${inspectorId})} : @{/admin/inspectores/nuevo}"
            method="post" th:object="${dto}">

        <div class="row g-3">
          <!-- Nombre -->
          <div class="col-12">
            <label class="form-label fw-semibold">Apellidos y nombres <span class="text-danger">*</span></label>
            <input type="text" th:field="*{nombreCompleto}" class="form-control"
                   th:classappend="${#fields.hasErrors('nombreCompleto')} ? 'is-invalid'"
                   placeholder="Ej: García López, Juan Carlos" required/>
            <div class="invalid-feedback" th:errors="*{nombreCompleto}"></div>
          </div>

          <!-- DNI -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">DNI <span class="text-danger">*</span></label>
            <input type="text" th:field="*{dni}" class="form-control"
                   th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'"
                   placeholder="8 dígitos" maxlength="8"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')" required/>
            <div class="invalid-feedback" th:errors="*{dni}"></div>
          </div>

          <!-- Teléfono -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Teléfono celular <span class="text-danger">*</span></label>
            <input type="tel" th:field="*{telefono}" class="form-control"
                   th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'"
                   placeholder="9 dígitos" maxlength="9"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')" required/>
            <div class="invalid-feedback" th:errors="*{telefono}"></div>
          </div>

          <!-- Correo -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Correo electrónico <span class="text-danger">*</span></label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="correo@municipalidad.gob.pe" required/>
            <div class="invalid-feedback" th:errors="*{email}"></div>
          </div>

          <!-- Cargo -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Cargo</label>
            <input type="text" th:field="*{cargo}" class="form-control"
                   placeholder="Inspector Municipal"/>
          </div>

          <!-- N° Colegiatura -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">N.° Colegiatura / Registro</label>
            <input type="text" th:field="*{numeroColegiatura}" class="form-control"
                   placeholder="Ej: CAL-12345"/>
          </div>

          <!-- Fecha nombramiento -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Fecha de nombramiento</label>
            <input type="date" th:field="*{fechaNombramiento}" class="form-control"/>
          </div>

          <hr class="my-2"/>

          <!-- Usuario -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              Usuario del sistema <span class="text-danger">*</span>
            </label>
            <input type="text" th:field="*{username}" class="form-control"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                   th:readonly="${inspectorId != null}"
                   placeholder="Ej: inspector.garcia" required/>
            <div class="invalid-feedback" th:errors="*{username}"></div>
            <div th:if="${errorUsername}" class="text-danger small mt-1" th:text="${errorUsername}"></div>
          </div>

          <!-- Contraseña -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              Contraseña
              <span th:if="${inspectorId == null}" class="text-danger">*</span>
              <span th:if="${inspectorId != null}" class="text-muted small">(dejar vacío para no cambiar)</span>
            </label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Mínimo 6 caracteres"
                   th:required="${inspectorId == null}"/>
            <div class="invalid-feedback" th:errors="*{password}"></div>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <a href="/admin/inspectores" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary fw-semibold">
            <i class="bi bi-save me-2"></i>
            <span th:text="${inspectorId != null} ? 'Guardar cambios' : 'Crear inspector'"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
