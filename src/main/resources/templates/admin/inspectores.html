<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Inspectores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body{background:#f0f4f8}
    .distrito-link{text-decoration:underline dotted;color:#1D3557;}
    .distrito-link:hover{color:#457B9D;}
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a>
  </div>
</nav>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
      <a href="/dashboard" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
      <h4 class="fw-bold mb-0">Inspectores municipales</h4>
    </div>
    <a href="/admin/inspectores/nuevo" class="btn btn-primary">
      <i class="bi bi-person-plus me-1"></i>Nuevo inspector
    </a>
  </div>



  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover bg-white shadow-sm rounded">
      <thead style="background:#1D3557;color:#fff">
        <tr>
          <th>Nombre completo</th>
          <th>DNI</th>
          <th>Usuario</th>
          <th>Rol</th>
          <th>Distrito</th>
          <th>Teléfono</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="i : ${inspectores}"
            th:classappend="${!i.activo} ? 'table-secondary opacity-75'">
          <td class="fw-semibold small" th:text="${i.nombreCompleto}"></td>
          <td th:text="${i.dni ?: '-'}"></td>
          <td class="text-muted small" th:text="${i.username}"></td>
          <td><span class="badge bg-secondary small" th:text="${i.rol.name().replace('_','')}"></span></td>
          <td class="small">
            <a th:if="${i.distrito != null}"
               th:href="@{/admin/inspectores(distrito=${i.distrito.name()})}"
               class="distrito-link"
               th:text="${i.distrito.name().replace('_',' ')}"></a>
            <span th:unless="${i.distrito != null}">-</span>
          </td>
          <td th:text="${i.telefono ?: '-'}"></td>
          <td>
            <span th:if="${i.activo}" class="badge bg-success">Activo</span>
            <span th:unless="${i.activo}" class="badge bg-secondary">Inactivo</span>
          </td>
          <td>
            <div class="d-flex gap-1">
              <a th:href="@{/admin/inspectores/{id}/editar(id=${i.id})}"
                 class="btn btn-outline-primary btn-sm">
                <i class="bi bi-pencil"></i>
              </a>
              <form th:action="@{/admin/inspectores/{id}/desactivar(id=${i.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm"
                        th:classappend="${i.activo} ? 'btn-outline-warning' : 'btn-outline-success'"
                        th:title="${i.activo} ? 'Desactivar' : 'Activar'">
                  <i th:classappend="${i.activo} ? 'bi bi-person-dash' : 'bi bi-person-check'" class="bi"></i>
                </button>
              </form>
              <form th:action="@{/admin/inspectores/{id}/eliminar(id=${i.id})}" method="post" style="display:inline"
                    onsubmit="return confirm('¿Eliminar definitivamente a ' + '[[${i.nombreCompleto}]]' + '? Esta acción no se puede deshacer.')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-danger btn-sm" title="Eliminar definitivamente">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
