<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Panel admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}
    .estado-ADMITIDO,.estado-INSPECCION_PROGRAMADA{background:#cfe2ff;color:#0a3c8c}
    .estado-OBSERVADO,.estado-SEGUNDA_INSPECCION_PROGRAMADA{background:#fff3cd;color:#664d03}
    .estado-APROBADO{background:#d1e7dd;color:#0a3622}
    .estado-DENEGADO{background:#f8d7da;color:#58151c}
    .badge-estado{font-size:.75rem;padding:.3em .7em;border-radius:20px;font-weight:600}
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
      <a href="/auth/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
    </div>
  </div>
</nav>
<div class="container">
  <h4 class="fw-bold mb-1">Panel de administración</h4>
  <p class="text-muted small mb-4">Trámites activos en el sistema.</p>

  <div th:if="${#lists.isEmpty(tramitesActivos)}" class="text-center py-5">
    <i class="bi bi-inbox text-muted" style="font-size:3rem"></i>
    <p class="text-muted mt-3">No hay trámites activos.</p>
  </div>

  <div class="table-responsive" th:unless="${#lists.isEmpty(tramitesActivos)}">
    <table class="table table-hover table-sm bg-white shadow-sm rounded">
      <thead style="background:#1D3557;color:#fff">
        <tr>
          <th>#</th><th>Razón social</th><th>Rubro</th><th>Estado</th><th>Fecha</th><th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${tramitesActivos}">
          <td class="text-muted small" th:text="${s.id}"></td>
          <td class="fw-semibold" th:text="${s.razonSocial}"></td>
          <td class="small" th:text="${s.rubro}"></td>
          <td>
            <span class="badge-estado" th:classappend="'estado-' + ${s.estado.name()}"
                  th:text="${s.estado.name().replace('_',' ')}"></span>
          </td>
          <td class="small text-muted" th:text="${#temporals.format(s.creadoEn,'dd/MM/yy')}"></td>
          <td>
            <a th:href="@{/solicitud/{id}/detalle(id=${s.id})}"
               class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-eye"></i>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
