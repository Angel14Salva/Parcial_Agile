<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Nuevo cajero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a>
  </div>
</nav>
<div class="container" style="max-width:600px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="/admin/cajeros" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0">Nuevo cajero</h4>
  </div>

  <div class="card shadow-sm">
    <div class="card-header fw-semibold" style="background:#1D3557;color:#fff">
      <i class="bi bi-person-badge me-2"></i>Datos del cajero
    </div>
    <div class="card-body p-4">
      <form th:action="@{/admin/cajeros/nuevo}" method="post" th:object="${dto}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Apellidos y nombres <span class="text-danger">*</span></label>
          <input type="text" th:field="*{nombreCompleto}" class="form-control"
                 placeholder="Ej: MEDINA ROJAS, PATRICIA" required/>
          <div th:if="${#fields.hasErrors('nombreCompleto')}" class="text-danger small mt-1" th:errors="*{nombreCompleto}"></div>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">DNI</label>
            <input type="text" th:field="*{dni}" class="form-control" placeholder="8 dígitos" maxlength="8"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="tel" th:field="*{telefono}" class="form-control" placeholder="9 dígitos" maxlength="9"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Correo electrónico <span class="text-danger">*</span></label>
          <input type="email" th:field="*{email}" class="form-control" placeholder="correo@municipalidad.gob.pe" required/>
          <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1" th:errors="*{email}"></div>
        </div>

        <hr class="my-3"/>
        <h6 class="fw-semibold text-muted mb-3 text-uppercase" style="font-size:.75rem;letter-spacing:1px">
          <i class="bi bi-lock me-1"></i>Credenciales del sistema
        </h6>
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario <span class="text-danger">*</span></label>
          <input type="text" th:field="*{username}" class="form-control" placeholder="Ej: cajero2" required/>
          <div th:if="${errorUsername}" class="text-danger small mt-1" th:text="${errorUsername}"></div>
          <div th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1" th:errors="*{username}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="password" id="inputPassword" th:field="*{password}" class="form-control"
                   placeholder="Mínimo 6 caracteres" required/>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePass()">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1" th:errors="*{password}"></div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <a href="/admin/cajeros" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary fw-semibold">
            <i class="bi bi-save me-2"></i>Crear cajero
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass() {
  const input = document.getElementById('inputPassword');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
