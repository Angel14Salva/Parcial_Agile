<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${titulo} + ' | Licencias Municipales'">Licencias Municipales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --azul: #1D3557; --verde: #1D9E75; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .sidebar { min-height: calc(100vh - 56px); background: #f8f9fa; border-right: 1px solid #dee2e6; }
    .sidebar .nav-link { color: #444; border-radius: 6px; margin-bottom: 2px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: var(--azul); color: #fff; }
    .badge-estado { font-size: .75rem; }
    .card-tramite { border-left: 4px solid var(--verde); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background: var(--azul)">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white-50 small" sec:authentication="name"></span>
      <a href="/auth/logout" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 sidebar py-3 px-2">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" href="/dashboard"><i class="bi bi-house me-2"></i>Inicio</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('NEGOCIO')">
          <a class="nav-link" href="/solicitud/nueva"><i class="bi bi-plus-circle me-2"></i>Nueva solicitud</a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('INSPECTOR','ADMIN')">
          <a class="nav-link" href="/dashboard"><i class="bi bi-clipboard-check me-2"></i>Inspecciones</a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('INSPECTOR','ADMIN')">
          <a class="nav-link" href="/dashboard"><i class="bi bi-shield-check me-2"></i>Fiscalización</a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="col-md-10 py-4 px-4">
      <!-- Alertas flash -->
      <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Contenido de la página -->
      <div th:replace="${contenido}"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
