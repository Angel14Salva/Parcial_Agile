<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Resultado inspección</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8} #secObservaciones{display:none}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container"><a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a></div>
</nav>
<div class="container" style="max-width:700px">
  <h4 class="fw-bold mb-1">Registrar resultado de inspección</h4>
  <p class="text-muted small mb-4"
     th:text="${inspeccion.solicitud.razonSocial} + ' — ' + ${inspeccion.solicitud.domicilioFiscal}"></p>

  <!-- Datos del expediente -->
  <div class="card shadow-sm mb-4">
    <div class="card-header fw-semibold">Expediente</div>
    <div class="card-body">
      <dl class="row mb-0 small">
        <dt class="col-sm-4 text-muted">Tipo inspección</dt>
        <dd class="col-sm-8" th:text="${inspeccion.tipo.name()}"></dd>
        <dt class="col-sm-4 text-muted">Fecha programada</dt>
        <dd class="col-sm-8" th:text="${#temporals.format(inspeccion.fechaProgramada,'dd/MM/yyyy')}"></dd>
        <dt class="col-sm-4 text-muted">Rubro</dt>
        <dd class="col-sm-8" th:text="${inspeccion.solicitud.rubro}"></dd>
        <dt class="col-sm-4 text-muted">Plano cargado</dt>
        <dd class="col-sm-8">
          <span th:if="${inspeccion.solicitud.planoUrl != null}" class="text-success">
            <i class="bi bi-check-circle me-1"></i>Disponible
          </span>
        </dd>
      </dl>
    </div>
  </div>

  <!-- Formulario resultado -->
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form th:action="@{/inspector/inspeccion/{id}/resultado(id=${inspeccion.id})}"
            method="post" th:object="${dto}">

        <div class="mb-3">
          <label class="form-label fw-semibold">Resultado <span class="text-danger">*</span></label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" th:field="*{resultado}"
                     value="CONFORME" id="conforme" onchange="toggleObs(this.value)"/>
              <label class="form-check-label text-success fw-semibold" for="conforme">
                <i class="bi bi-check-circle me-1"></i>Conforme
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" th:field="*{resultado}"
                     value="CON_OBSERVACIONES" id="conObs" onchange="toggleObs(this.value)"/>
              <label class="form-check-label text-warning fw-semibold" for="conObs">
                <i class="bi bi-exclamation-triangle me-1"></i>Con observaciones
              </label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Notas del inspector</label>
          <textarea th:field="*{notas}" class="form-control" rows="3"
                    placeholder="Observaciones generales de la visita..."></textarea>
        </div>

        <!-- Sección de observaciones específicas -->
        <div id="secObservaciones" class="border rounded p-3 mb-3" style="background:#fffbf0">
          <h6 class="fw-semibold mb-3 text-warning">
            <i class="bi bi-exclamation-triangle me-2"></i>Observaciones detectadas
          </h6>
          <div id="obsContainer">
            <!-- Observación 1 por defecto -->
            <div class="obs-item border rounded p-3 mb-2" style="background:#fff">
              <div class="row g-2">
                <div class="col-md-4">
                  <label class="form-label small fw-semibold">Tipo</label>
                  <select name="observaciones[0].tipo" class="form-select form-select-sm">
                    <option value="DOCUMENTAL">Documental (resubir archivo)</option>
                    <option value="FISICA">Física (cambio en local)</option>
                  </select>
                </div>
                <div class="col-md-8">
                  <label class="form-label small fw-semibold">Descripción</label>
                  <input type="text" name="observaciones[0].descripcion" class="form-control form-control-sm"
                         placeholder="Descripción de la observación"/>
                </div>
              </div>
            </div>
          </div>
          <button type="button" class="btn btn-outline-secondary btn-sm mt-1" onclick="agregarObs()">
            <i class="bi bi-plus me-1"></i>Agregar observación
          </button>
        </div>

        <div class="d-flex gap-2 mt-3">
          <a href="/dashboard" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary fw-semibold">
            <i class="bi bi-save me-2"></i>Guardar resultado
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let obsIdx = 1;
  function toggleObs(val) {
    document.getElementById('secObservaciones').style.display =
      val === 'CON_OBSERVACIONES' ? 'block' : 'none';
  }
  function agregarObs() {
    const c = document.getElementById('obsContainer');
    const div = document.createElement('div');
    div.className = 'obs-item border rounded p-3 mb-2';
    div.style.background = '#fff';
    div.innerHTML = `<div class="row g-2">
      <div class="col-md-4">
        <label class="form-label small fw-semibold">Tipo</label>
        <select name="observaciones[${obsIdx}].tipo" class="form-select form-select-sm">
          <option value="DOCUMENTAL">Documental (resubir archivo)</option>
          <option value="FISICA">Física (cambio en local)</option>
        </select>
      </div>
      <div class="col-md-8">
        <label class="form-label small fw-semibold">Descripción</label>
        <input type="text" name="observaciones[${obsIdx}].descripcion"
               class="form-control form-control-sm" placeholder="Descripción"/>
      </div>
    </div>`;
    c.appendChild(div);
    obsIdx++;
  }
</script>
</body></html>
