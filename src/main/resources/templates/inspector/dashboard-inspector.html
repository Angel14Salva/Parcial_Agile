<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Panel inspector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-building me-2"></i>Licencias Municipales</a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
      <form action="/auth/logout" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
      </form>
    </div>
  </div>
</nav>
<div class="container">
  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-1">Panel del inspector</h4>
      <p class="text-muted small mb-0" th:text="'Bienvenido, ' + ${usuario.nombreCompleto}"></p>
    </div>
    <a href="/multas" class="btn btn-outline-danger btn-sm">
      <i class="bi bi-list-ul me-1"></i>Ver todas las multas
    </a>
  </div>

  <div th:if="${#lists.isEmpty(inspeccionesPendientes)}" class="text-center py-5">
    <i class="bi bi-clipboard-check text-muted" style="font-size:3rem"></i>
    <p class="text-muted mt-3">No tienes inspecciones pendientes.</p>
  </div>

  <div class="row g-3" th:unless="${#lists.isEmpty(inspeccionesPendientes)}">
    <div class="col-md-6" th:each="i : ${inspeccionesPendientes}">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between mb-2">
            <span class="badge bg-warning text-dark" th:text="${i.tipo.name()}">TIPO</span>
            <span class="text-muted small" th:text="${#temporals.format(i.fechaProgramada, 'dd/MM/yyyy')}"></span>
          </div>
          <h6 class="fw-bold" th:text="${i.solicitud.razonSocial}">Negocio</h6>
          <p class="text-muted small mb-1"><i class="bi bi-geo-alt me-1"></i><span th:text="${i.solicitud.domicilioFiscal}"></span></p>
          <p class="text-muted small mb-3"><i class="bi bi-tag me-1"></i><span th:text="${i.solicitud.rubro}"></span></p>
          <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/inspector/inspeccion/{id}(id=${i.id})}" class="btn btn-primary btn-sm">
              <i class="bi bi-clipboard-plus me-1"></i>Registrar resultado
            </a>
            <!-- Botón multas si la solicitud tiene licencia -->
            <a th:if="${i.solicitud.licencia != null}"
               th:href="@{/multas/licencia/{id}(id=${i.solicitud.licencia.id})}"
               class="btn btn-outline-danger btn-sm">
              <i class="bi bi-exclamation-octagon me-1"></i>Multas
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
