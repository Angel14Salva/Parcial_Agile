<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Panel inspector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f0f4f8}</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1D3557">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-building me-2"></i>Licencias Municipales
    </a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <span class="text-white-50 small" sec:authentication="name"></span>
      <form action="/auth/logout" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </form>
    </div>
  </div>
</nav>

<div class="container">
  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <h4 class="fw-bold mb-1">Panel del inspector</h4>
  <p class="text-muted small mb-4" th:text="'Bienvenido, ' + ${usuario.nombreCompleto}"></p>

  <!-- ── Inspecciones pendientes ───────────────────────────────────────── -->
  <h5 class="fw-semibold mb-3">
    <i class="bi bi-clipboard-check me-2 text-primary"></i>Inspecciones pendientes
  </h5>

  <div th:if="${#lists.isEmpty(inspeccionesPendientes)}"
       class="text-center py-4 bg-white rounded shadow-sm mb-4">
    <i class="bi bi-clipboard-check text-muted" style="font-size:2.5rem"></i>
    <p class="text-muted mt-2 mb-0">No tienes inspecciones pendientes.</p>
  </div>

  <div class="row g-3 mb-5" th:unless="${#lists.isEmpty(inspeccionesPendientes)}">
    <div class="col-md-6" th:each="i : ${inspeccionesPendientes}">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between mb-2">
            <span class="badge bg-warning text-dark" th:text="${i.tipo.name()}">TIPO</span>
            <span class="text-muted small"
                  th:text="${#temporals.format(i.fechaProgramada, 'dd/MM/yyyy')}"></span>
          </div>
          <h6 class="fw-bold" th:text="${i.solicitud.razonSocial}">Negocio</h6>
          <p class="text-muted small mb-1">
            <i class="bi bi-geo-alt me-1"></i>
            <span th:text="${i.solicitud.domicilioFiscal}"></span>
          </p>
          <p class="text-muted small mb-3">
            <i class="bi bi-tag me-1"></i>
            <span th:text="${i.solicitud.rubro}"></span>
          </p>
          <a th:href="@{/inspector/inspeccion/{id}(id=${i.id})}"
             class="btn btn-primary btn-sm">
            <i class="bi bi-clipboard-plus me-1"></i>Registrar resultado
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Licencias vigentes para fiscalización ─────────────────────────── -->
  <h5 class="fw-semibold mb-3">
    <i class="bi bi-shield-check me-2 text-success"></i>Licencias vigentes
    <small class="text-muted fw-normal fs-6 ms-2">— Fiscalización e inspecciones de oficio</small>
  </h5>

  <div th:if="${#lists.isEmpty(licenciasVigentes)}"
       class="text-center py-4 bg-white rounded shadow-sm mb-4">
    <i class="bi bi-award text-muted" style="font-size:2.5rem"></i>
    <p class="text-muted mt-2 mb-0">No hay licencias vigentes actualmente.</p>
  </div>

  <div class="table-responsive" th:unless="${#lists.isEmpty(licenciasVigentes)}">
    <table class="table table-hover bg-white shadow-sm rounded">
      <thead style="background:#1D3557;color:#fff">
        <tr>
          <th>N.° Licencia</th>
          <th>Negocio</th>
          <th>Rubro</th>
          <th>Vence</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="l : ${licenciasVigentes}">
          <td class="fw-semibold small" th:text="${l.numeroLicencia}"></td>
          <td class="small" th:text="${l.solicitud.razonSocial}"></td>
          <td class="small text-muted" th:text="${l.solicitud.rubro}"></td>
          <td class="small" th:text="${#temporals.format(l.fechaVencimiento,'dd/MM/yyyy')}"></td>
          <td>
            <div class="d-flex gap-1">
              <a th:href="@{/fiscalizacion/licencia/{id}/oficio(id=${l.id})}"
                 class="btn btn-outline-warning btn-sm"
                 title="Inspección de oficio">
                <i class="bi bi-search"></i> Oficio
              </a>
              <a th:href="@{/multas/licencia/{id}/nueva(id=${l.id})}"
                 class="btn btn-outline-danger btn-sm"
                 title="Registrar multa">
                <i class="bi bi-exclamation-octagon"></i> Multa
              </a>
              <a th:href="@{/multas/licencia/{id}(id=${l.id})}"
                 class="btn btn-outline-secondary btn-sm"
                 title="Ver historial de multas">
                <i class="bi bi-list-ul"></i>
              </a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
