<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #1D3557 0%, #457B9D 100%); min-height: 100vh; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-4">
<div class="card shadow-lg" style="width:480px;border-radius:16px;overflow:hidden">
  <div class="text-white text-center py-4" style="background:#1D3557">
    <i class="bi bi-building fs-2"></i>
    <h5 class="fw-bold mt-2 mb-0">Crear cuenta</h5>
    <p class="small opacity-75 mb-0">Municipalidad de Trujillo</p>
  </div>
  <div class="card-body p-4">

    <div th:if="${error}" class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/auth/registro}" method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Razón social / Nombre completo <span class="text-danger">*</span></label>
        <input type="text" name="nombreCompleto" class="form-control" required
               placeholder="Ej: Comercial López S.A.C."/>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold small">Usuario <span class="text-danger">*</span></label>
          <input type="text" name="username" class="form-control" required
                 placeholder="Ej: comercial.lopez"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small">Correo electrónico <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control" required
                 placeholder="correo@empresa.com"/>
        </div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold small">Contraseña <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="password" id="pass1" name="password" class="form-control" required
                   placeholder="Mínimo 6 caracteres"/>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePass('pass1',this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small">Confirmar contraseña <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="password" id="pass2" name="confirmar" class="form-control" required
                   placeholder="Repite la contraseña"/>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePass('pass2',this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div id="errPass" class="text-danger small mt-1 d-none">Las contraseñas no coinciden.</div>
        </div>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="terminos" required/>
        <label class="form-check-label small" for="terminos">
          Acepto los términos y condiciones del servicio de licencias municipales.
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
        <i class="bi bi-person-plus me-2"></i>Crear cuenta
      </button>
    </form>

    <p class="text-center mt-3 small text-muted">
      ¿Ya tienes cuenta? <a href="/auth/login" class="text-primary fw-semibold">Inicia sesión</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
document.querySelector('form').addEventListener('submit', e => {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  if (p1 !== p2) {
    e.preventDefault();
    document.getElementById('errPass').classList.remove('d-none');
  }
});
</script>
</body>
</html>
