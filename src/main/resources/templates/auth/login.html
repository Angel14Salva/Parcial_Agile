<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Iniciar sesión | Licencias Municipales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; }
    .login-card { max-width: 420px; margin: 80px auto; border-radius: 12px; border: none;
                  box-shadow: 0 4px 24px rgba(0,0,0,.1); }
    .login-header { background: #1D3557; border-radius: 12px 12px 0 0; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="card login-card">
    <div class="login-header">
      <i class="bi bi-building text-white" style="font-size:2.5rem"></i>
      <h4 class="text-white mt-2 mb-0">Licencias de Funcionamiento</h4>
      <p class="text-white-50 small mb-0">Municipalidad</p>
    </div>
    <div class="card-body p-4">
      <div th:if="${param.pagoExitoso}" class="alert alert-success py-2">
        <i class="bi bi-check-circle me-2"></i>
        <strong>¡Pago confirmado!</strong> Tu trámite fue admitido. Inicia sesión para continuar.
      </div>
      <div th:if="${error}" class="alert alert-danger py-2">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
      </div>
      <div th:if="${msg}" class="alert alert-success py-2">
        <span th:text="${msg}"></span>
      </div>

      <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="usuario" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
      </form>
      <div class="mt-3 text-center">
        <a href="/publico" class="btn btn-outline-secondary w-100">
          <i class="bi bi-arrow-left me-1"></i>Volver al portal ciudadano
        </a>
      </div>

      <hr class="my-3"/>
      
    </div>
  </div>
</div>
</body>
</html>
