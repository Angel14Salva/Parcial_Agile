# ── Perfil activo ──────────────────────────────────────────────────────────────
spring.profiles.active=local

# ── Servidor ───────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de datos (local - Codespace) ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/licencias_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Thymeleaf ──────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Subida de archivos (planos) ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ── Aplicación ─────────────────────────────────────────────────────────────────
app.nombre=Municipalidad - Licencias de Funcionamiento
app.pago.tramite=180.00
app.pago.renovacion=180.00
app.inspeccion.dias-habiles=30
app.licencia.vigencia-dias=365
app.licencia.alerta-dias-1=30
app.licencia.alerta-dias-2=7
