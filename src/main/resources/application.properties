spring.profiles.active=local
server.port=8080

spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/licencias_db
spring.datasource.username=codespace
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/
app.nombre=Municipalidad - Licencias de Funcionamiento
app.pago.tramite=5.00
app.pago.renovacion=2.00
app.inspeccion.dias-habiles=30
app.inspeccion.capacidad-diaria=4
# En 0 para la demo: las inspecciones que se creen de ahora en adelante caen hoy
# en vez de manana. Volver a 1 quinta el modo demo.
app.inspeccion.dias-anticipacion=0

# Reinicio unico de datos de demo: en true, DataInitializer borra TODAS las
# solicitudes/inspecciones/licencias/observaciones/multas existentes al arrancar
# (no toca usuarios ni caja). Poner en false despues de que corra una vez para
# que no se repita en cada redeploy.
app.demo.reset-solicitudes=${RESET_DEMO:false}
app.licencia.vigencia-dias=365
app.licencia.alerta-dias-1=30
app.licencia.alerta-dias-2=7
server.forward-headers-strategy=framework

